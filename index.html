<!DOCTYPE html>
<html lang="th">
<head>
<meta charset="UTF-8">
<title>Element Quiz Game</title>

<style>
:root {
  --bg: #0f172a;
  --text: #ffffff;
  --card: #1e293b;
  --btn: #3b82f6;
}

body.light {
  --bg: #f1f5f9;
  --text: #0f172a;
  --card: #ffffff;
  --btn: #2563eb;
}

body {
  margin: 0;
  font-family: Arial;
  background: var(--bg);
  color: var(--text);
  transition: all 0.4s ease; /* fade */
  text-align: center;
}

/* ปุ่ม */
button {
  padding: 12px;
  margin: 10px;
  border: none;
  border-radius: 12px;
  background: var(--btn);
  color: white;
  cursor: pointer;
  font-size: 16px;
  transition: transform 0.1s, background 0.3s;
}

button:active {
  transform: scale(0.92); /* เด้ง */
}

/* หน้า */
.screen {
  display: none;
}

.active {
  display: block;
}

.card {
  font-size: 60px;
  margin: 30px;
}

/* ธีมปุ่ม */
.theme-toggle {
  position: fixed;
  bottom: 20px;
  right: 20px;
  font-size: 20px;
  border-radius: 50%;
  width: 50px;
  height: 50px;
}

/* ตาราง */
.table {
  display: grid;
  grid-template-columns: repeat(4, 1fr);
  gap: 10px;
  padding: 10px;
}

.cell {
  background: var(--card);
  padding: 10px;
  border-radius: 10px;
}
</style>
</head>

<body>

<!-- 🌟 MENU -->
<div id="menu" class="screen active">
  <h1>🧪 Element Quiz Game</h1>
  <p>เลือกโหมด</p>

  <button onclick="startLevel()">🟢 Level Mode</button><br>
  <button onclick="startMemory()">🔵 Memory 118</button><br>
  <button onclick="showTable()">🟣 Periodic Table</button>
</div>

<!-- 🎮 GAME -->
<div id="game" class="screen">
  <h2 id="score">คะแนน: 0 | Level: 1</h2>
  <div id="question" class="card"></div>
  <div id="choices"></div>
  <br>
  <button onclick="backMenu()">← กลับเมนู</button>
</div>

<!-- 📊 TABLE -->
<div id="table" class="screen">
  <h2>📊 ตารางธาตุ</h2>
  <div id="tableData" class="table"></div>
  <br>
  <button onclick="backMenu()">← กลับเมนู</button>
</div>

<!-- 🌙 Theme -->
<button class="theme-toggle" onclick="toggleTheme()">🌙</button>

<script>
/* 🌗 Theme */
function toggleTheme(){
  document.body.classList.toggle("light");
  localStorage.setItem("theme", document.body.classList.contains("light") ? "light" : "dark");
}

if(localStorage.getItem("theme")==="light"){
  document.body.classList.add("light");
}

/* 📚 Elements (ตัวอย่าง + คุณเพิ่มต่อได้) */
const elements = [
  {s:"H", th:"ไฮโดรเจน", en:"Hydrogen"},
  {s:"He", th:"ฮีเลียม", en:"Helium"},
  {s:"Li", th:"ลิเทียม", en:"Lithium"},
  {s:"C", th:"คาร์บอน", en:"Carbon"},
  {s:"O", th:"ออกซิเจน", en:"Oxygen"},
  {s:"Na", th:"โซเดียม", en:"Sodium"},
  {s:"Fe", th:"เหล็ก", en:"Iron"},
  {s:"Cu", th:"ทองแดง", en:"Copper"},
  {s:"Zn", th:"สังกะสี", en:"Zinc"},
  {s:"Cl", th:"คลอรีน", en:"Chlorine"}
];

let score=0, level=1, queue=[];

/* 🎮 Screen */
function show(id){
  document.querySelectorAll(".screen").forEach(s=>s.classList.remove("active"));
  document.getElementById(id).classList.add("active");
}

/* 🟢 Level Mode */
function startLevel(){
  level=1;
  score=0;
  queue = shuffle(elements).slice(0,10);
  show("game");
  nextQ();
}

/* 🔵 Memory */
function startMemory(){
  score=0;
  queue = shuffle([...elements]);
  show("game");
  nextQ();
}

/* 🟣 Table */
function showTable(){
  show("table");
  let html="";
  elements.forEach(e=>{
    html += `<div class="cell">${e.s}<br>${e.th}<br>${e.en}</div>`;
  });
  document.getElementById("tableData").innerHTML = html;
}

/* 🔄 Question */
function nextQ(){
  if(queue.length===0){
    alert("ผ่านด่าน!");
    backMenu();
    return;
  }

  const q = queue[0];
  const askSymbol = Math.random() < 0.5;

  document.getElementById("question").innerText =
    askSymbol ? q.s : `${q.th}`;

  let correct = askSymbol ? q.th : q.s;

  let choices=[correct];
  while(choices.length<4){
    let rand = elements[Math.floor(Math.random()*elements.length)];
    let val = askSymbol ? rand.th : rand.s;
    if(!choices.includes(val)) choices.push(val);
  }

  choices = shuffle(choices);

  let html="";
  choices.forEach(c=>{
    html += `<button onclick="answer('${c}','${correct}')">${c}</button>`;
  });

  document.getElementById("choices").innerHTML = html;
  document.getElementById("score").innerText = `คะแนน: ${score} | Level: ${level}`;
}

/* ✅ Answer */
function answer(c,correct){
  if(c===correct){
    score+=10;
    queue.shift();
  }else{
    score-=5;
    queue.push(queue.shift());
  }
  nextQ();
}

/* 🔙 Menu */
function backMenu(){
  show("menu");
}

/* 🔀 */
function shuffle(a){
  return a.sort(()=>Math.random()-0.5);
}
</script>

</body>
</html>
